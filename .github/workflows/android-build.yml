name: Android Debug Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  GODOT_VERSION: "4.5"
  EXPORT_NAME: opengsgproto

jobs:
  export-android-debug:
    name: Export Android (debug)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv /root/.config/godot ~/.config/godot

      - name: Make build dir
        run: mkdir -v -p build/android ci-logs

      - name: Diagnose Android/editor config
        shell: bash
        run: |
          {
            echo "== env =="
            env | grep -i -E "android|godot|home|java" || true
            echo "== which adb / java / sdk tools =="
            which adb || echo "adb not found"
            which java && java -version 2>&1 || echo "java not found"
            echo "== editor_settings tres (keystore/sdk lines) =="
            find ~/.config/godot /root/.config/godot -name "editor_settings-*.tres" 2>/dev/null -exec echo "-- {} --" \; -exec grep -i -E "keystore|android_sdk|adb|java" {} \; || true
            echo "== looking for debug.keystore on disk =="
            find / -iname "debug.keystore" 2>/dev/null || true
            echo "== looking for android sdk dirs =="
            find / -maxdepth 4 -iname "*android*sdk*" -o -iname "cmdline-tools" 2>/dev/null | head -30 || true
            echo "== build-tools dirs =="
            find / -maxdepth 6 -path "*build-tools*" -type d 2>/dev/null | head -30 || true
            echo "== android_source.zip (gradle build template) =="
            find ~/.local/share/godot/export_templates -iname "android_source.zip" 2>/dev/null || true
            echo "== full export_templates dir listing =="
            find ~/.local/share/godot/export_templates -maxdepth 2 -type f 2>/dev/null || true
          } | tee ci-logs/diagnose.txt

      - name: Install Android Gradle build template
        shell: bash
        run: |
          set -e
          TEMPLATE_ZIP=$(find ~/.local/share/godot/export_templates -iname "android_source.zip" | head -1)
          echo "Using template: $TEMPLATE_ZIP"
          mkdir -p android/build
          unzip -o -q "$TEMPLATE_ZIP" -d android/build
          touch android/build/.gdignore
          {
            echo "== android/build listing =="
            ls -la android/build
            echo "== build.gradle present? =="
            test -f android/build/build.gradle && echo YES || echo NO
            echo "== gradlew present? =="
            test -f android/build/gradlew && echo YES || echo NO
            echo "== libs dir recursive =="
            find android/build/libs -type f 2>/dev/null || echo "no libs dir"
          } | tee -a ci-logs/diagnose.txt

      - name: Export debug APK
        id: export
        shell: bash
        run: |
          set -o pipefail
          stdbuf -oL -eL godot --headless --verbose --export-debug "Android" ./build/android/${EXPORT_NAME}.apk 2>&1 | tee ci-logs/last-export-log.txt

      - name: Save log on failure
        if: failure()
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.email "ci@opengsgproto.local"
          git config user.name "CI Log Bot"
          git add ci-logs/
          git commit -m "ci: capture failed export log [skip ci]" || echo "nothing to commit"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error

